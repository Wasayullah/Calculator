<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <link rel="stylesheet" href="https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/css/bootstrap.min.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.5.0/css/all.min.css">
    <title>Calculator</title>

    <style>
        body {
            background: #0f0f0f;
            display: flex;
            flex-direction: column;
            justify-content: center;
            align-items: center;
            height: 100vh;
        }


        .calculator {
            width: 300px;
            background: #1e1e1e;
            border-radius: 20px;
            padding: 15px;
            box-shadow: 0 10px 25px rgba(0, 0, 0, 0.6);
        }


        #screen {
            height: 70px;
            width: 100%;
            border-radius: 12px;
            background-color: #049795;
            color: #031f7a;
            border: 2px solid #333;
            font-size: 1.8rem;
            text-align: right;
            padding: 10px;
            margin-bottom: 15px;
            overflow-x: auto !important ;
        }


        .buttons {
            display: grid;
            grid-template-columns: repeat(4, 1fr);
            gap: 10px;
        }


        button {
            height: 55px;
            border: none;
            border-radius: 12px;
            font-size: 1.2rem;
            background: #2c2c2c;
            color: white;
            transition: 0.2s;
        }

        button:hover {
            background: #3a3a3a;
        }

        .operator {
            background: #ff9500;
            color: white;
        }


        .equal {
            background: #00c896;
        }

        .fa-code:before {
            content: "\f121";
        }
    </style>
</head>

<body>

    <div class="calculator">
        <h1 class=" fs-4 text-white mb-0">Calculator</h1>
        <small class="text-white fs-5">M-549 <i> Scientific-calculator</i></small>
        <input type="text" readonly class="  mt-3" id="screen">

        <div class="buttons">


            <button onclick="item('M')">M</button>
            <button onclick="item('M+')">M+</button>
            <button onclick="item('M-')">M-</button>
            <button class="bg-danger" style="grid-column: span 1;" onclick="item('r')">Reset</button>

            <button onclick="item('^2')"><i>x</i><sup>2</sup></button>
            <button onclick="item('%')">&percnt;</button>
            <button class="bg-danger" onclick="item('c')">C</button>
            <button onclick="item('X')" class="bg-danger">&#x2718;</button>

            <button onclick="item(7)">7</button>
            <button onclick="item(8)">8</button>
            <button onclick="item(9)">9</button>
            <button onclick="item('*')" class="operator">&#x2715</button>

            <button onclick="item(4)">4</button>
            <button onclick="item(5)">5</button>
            <button onclick="item(6)">6</button>
            <button onclick="item('-')" class="operator">&minus;</button>

            <button onclick="item(1)">1</button>
            <button onclick="item(2)">2</button>
            <button onclick="item(3)">3</button>
            <button onclick="item('+')" class="operator">&plus;</button>

            <button onclick="item(0)">0</button>
            <button onclick="item('.')">.</button>
            <button onclick="item('=')" class="equal">=</button>
            <button onclick="item('/')" class="operator">&divide;</button>
        </div>
        <p class="text-center text-secondary mt-0 p-3 mb-0 rounded-4">
            <small>
                <i class="fas fa-code"></i> Developer Mohammad wasayullah <br>
                &copy;All rights reserved 2026
            </small>
        </p>

    </div>


    <script src="app.js"></script>
    <script src="	https://cdn.jsdelivr.net/npm/bootstrap@5.3.8/dist/js/bootstrap.bundle.min.js"></script>
</body>

</html>
